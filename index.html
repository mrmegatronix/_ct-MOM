<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Celebration - Coasters Tavern</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --rose-red: var(--cfg-primary, #A81C2E);
            --soft-pink: var(--cfg-soft-pink, #FFF0F5);
            --cream: var(--cfg-cream, #FFFAF0);
            --text-dark: var(--cfg-text-dark, #4A0E0E);
            --glow: var(--cfg-glow, rgba(168, 28, 46, 0.4));
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background-color: var(--cream);
            color: var(--text-dark);
        }

        /* Floral Background Decoration */
        .floral-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
        }

        /* Top Floral Border */
        .floral-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            display: flex;
            justify-content: center;
            z-index: 5;
        }
        .floral-top::before {
            content: '🌸 🌺 🌸 🌺 🌸 🌺 🌸 🌺 🌸';
            font-size: 2rem;
            filter: grayscale(0.2) opacity(0.6);
            letter-spacing: 1rem;
            padding-top: 1rem;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Slideshow Container */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .slide.active {
            opacity: 1;
        }

        .content {
            background: rgba(255, 255, 255, 0.7);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(168, 28, 46, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 85%;
            width: fit-content;
        }

        .slide-overlay-img {
            max-width: 70%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            border: 5px solid white;
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(168, 28, 46, 0.05);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--rose-red);
            box-shadow: 0 0 10px var(--glow);
            transition: width 0.1s linear;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 8rem;
            margin: 0;
            color: var(--rose-red);
            line-height: 1;
        }

        h2 {
            font-size: 2rem;
            font-weight: 300;
            margin: 1.5rem 0;
            color: var(--text-dark);
            max-width: 600px;
        }

        .subtext {
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 1rem 0;
            font-weight: 400;
            color: var(--text-dark);
        }

        .highlight {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--rose-red);
            margin-top: 2rem;
        }

        /* Logo Placeholder */
        .logo-seal {
            position: absolute;
            bottom: 3rem;
            right: 3rem;
            width: 120px;
            height: 120px;
            border: 2px solid var(--text-dark);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            background: rgba(255,255,255,0.8);
            z-index: 20;
        }
        /* QR Code Styling */
        .qr-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .qr-frame {
            background: white;
            padding: 1rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(168, 28, 46, 0.15);
            border: 2px solid var(--rose-red);
            transition: transform 0.3s ease;
        }

        .qr-frame:hover {
            transform: scale(1.05);
        }

        .qr-frame img {
            display: block;
            width: 180px;
            height: 180px;
        }

        .qr-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--rose-red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="floral-bg"></div>
    <div class="floral-top"></div>
    <canvas id="confetti-canvas"></canvas>

    <div class="slideshow-container" id="slides-wrapper">
        <!-- Slides will be injected here -->
        <div class="slide active">
            <div class="content">
                <h1>Loading...</h1>
                <h2>Mother's Day Celebration</h2>
            </div>
        </div>
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="logo-seal">
        <div style="font-size: 0.6rem;">Est.</div>
        <div style="font-weight: 800; font-size: 0.9rem;">COASTERS</div>
        <div style="font-size: 0.6rem;">TAVERN</div>
    </div>

    <script>
        // --- Security Helpers ---
        function sanitize(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
        }
        function safeUrl(url) {
            if (!url) return '';
            return String(url).trim();
        }

        // --- State ---
        let state = {
            slides: [],
            currentSlideIdx: 0,
            isPaused: false,
            disabledSlides: [],
            overrides: {}
        };

        // --- DOM Elements ---
        const slidesWrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');

        // --- Broadcast Channel setup ---
        const bc = new BroadcastChannel('mom_sync');
        bc.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'STATE_UPDATE') {
                updateState(data.payload);
            }
            if (data.type === 'SLIDE_CMD') {
                handleSlideCmd(data.payload.cmd);
            }
            if (data.type === 'CONFETTI') {
                createConfettiBurst();
            }
        };

        function handleSlideCmd(cmd) {
            if (cmd === 'next') nextSlide();
            if (cmd === 'prev') prevSlide();
            if (cmd === 'toggle') toggleSlidePlay();
        }

        function updateState(newState) {
            state = { ...state, ...newState };
            if (newState.slides || newState.disabledSlides || newState.overrides) {
                renderSlides();
            }
            localStorage.setItem('mom_state', JSON.stringify(state));
        }

        function toggleSlidePlay() {
            state.isPaused = !state.isPaused;
            if (state.isPaused) {
                clearInterval(slideInterval);
                clearInterval(progressInterval);
            } else {
                startSlideTimer(30000); // Default resume
            }
        }

        // --- Slideshow Logic ---
        let slideInterval;
        let progressInterval;

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + 1) % slides.length;
            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 8000;
            startSlideTimer(dur);
            createConfettiBurst();
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + slides.length - 1) % slides.length;
            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 8000;
            startSlideTimer(dur);
        }

        function startSlideTimer(duration) {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            
            let start = Date.now();
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let percent = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(percent, 100) + '%';
            }, 50);

            if (state.isPaused) return;

            slideInterval = setInterval(() => {
                if (state.isPaused) return;
                nextSlide();
            }, duration);
        }

        function renderSlides() {
            const visibleSlides = state.slides.filter(s => !(state.disabledSlides || []).includes(s.title));
            if (visibleSlides.length === 0) {
                slidesWrapper.innerHTML = '<div class="slide active"><div class="content"><h1>Welcome</h1><h2>Preparing Celebration...</h2></div></div>';
                return;
            }

            const overrides = state.overrides || {};

            slidesWrapper.innerHTML = visibleSlides.map((slide, i) => {
                const ov = overrides[slide.title] || {};
                const title = ov.title || slide.title || '';
                const subtitle = ov.subtitle || slide.subtitle || '';
                const duration = ov.duration || slide.duration || 8000;

                const bgImg = safeUrl(slide.backgroundImage);
                const overlayImg = safeUrl(slide.overlayImage);
                const bgStyle = bgImg ? `background-image: url('${bgImg}'); background-size: cover; background-position: center;` : '';
                
                return `
                    <div class="slide ${i === state.currentSlideIdx ? 'active' : ''}" style="${bgStyle}" data-duration="${duration}">
                        ${bgImg ? '<div class="slide-image-overlay"></div>' : ''}
                        <div class="content" style="position: relative; z-index: 10;">
                            ${overlayImg ? `<img src="${overlayImg}" class="slide-overlay-img">` : ''}
                            ${title ? `<h1>${sanitize(title)}</h1>` : ''}
                            ${subtitle ? `<h2>${sanitize(subtitle)}</h2>` : ''}
                            ${slide.type === 'qr' ? `
                                <div class="qr-container">
                                    <div class="qr-label">Scan to Book</div>
                                    <div class="qr-frame">
                                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(slide.bubbleText || 'https://coasters.co.nz')}" alt="QR Code">
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (state.currentSlideIdx >= visibleSlides.length) state.currentSlideIdx = 0;
            const currentOv = overrides[visibleSlides[state.currentSlideIdx]?.title] || {};
            const currentDur = currentOv.duration || visibleSlides[state.currentSlideIdx]?.duration || 8000;
            startSlideTimer(currentDur);
        }

        // --- Google Sheets Sync ---
        function splitCSVLine(line) {
            const parts = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    parts.push(current.trim());
                    current = '';
                } else current += char;
            }
            parts.push(current.trim());
            return parts;
        }

        function parseSlidesCSV(text) {
            const rows = text.split(/\r?\n/).filter(line => line.trim());
            if (rows.length < 2) return [];

            return rows.slice(1).map(line => {
                const parts = splitCSVLine(line);
                const clean = parts.map(p => p.replace(/^"|"$/g, '').trim());
                return {
                    title: clean[0],
                    subtitle: clean[1] || '',
                    type: (clean[2] || 'normal').toLowerCase(),
                    duration: parseInt(clean[3]) || 8000,
                    backgroundImage: clean[4] || '',
                    overlayImage: clean[5] || '',
                    bubbleText: clean[6] || ''
                };
            }).filter(s => s.title || s.subtitle);
        }

        async function fetchAndApplySlides() {
            const url = window.MOM_CONFIG.GSHEETS_URL;
            if(!url) return;
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now());
                const csv = await res.text();
                const slides = parseSlidesCSV(csv);
                if (slides.length > 0) {
                    updateState({ slides });
                }
            } catch (e) {
                console.error('[MOM] Failed to fetch slides:', e);
            }
        }

        // --- Flower Confetti Logic ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const flowers = ['💐', '🌸', '🌺', '🌷', '🌹', '🌻'];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.char = flowers[Math.floor(Math.random() * flowers.length)];
                this.size = Math.random() * 20 + 20;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 1.5 + 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y / 50) * 0.5;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char, 0, 0);
                ctx.restore();
            }
        }

        function initParticles() {
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function createConfettiBurst() {
            for (let i = 0; i < 15; i++) {
                const p = new Particle();
                p.y = -50;
                p.speedY += 3;
                particles.push(p);
                setTimeout(() => {
                    const idx = particles.indexOf(p);
                    if(idx > -1) particles.splice(idx, 1);
                }, 10000);
            }
        }

        // --- Init ---
        async function init() {
            const cfg = window.MOM_CONFIG;
            if (cfg) {
                const root = document.documentElement;
                if (cfg.COLORS.primary) root.style.setProperty('--cfg-primary', cfg.COLORS.primary);
                if (cfg.COLORS.softPink) root.style.setProperty('--cfg-soft-pink', cfg.COLORS.softPink);
                if (cfg.COLORS.cream) root.style.setProperty('--cfg-cream', cfg.COLORS.cream);
                if (cfg.COLORS.textDark) root.style.setProperty('--cfg-text-dark', cfg.COLORS.textDark);
                if (cfg.COLORS.glow) root.style.setProperty('--cfg-glow', cfg.COLORS.glow);
            }

            const stored = localStorage.getItem('mom_state');
            if (stored) {
                try { updateState(JSON.parse(stored)); } catch(e){}
            }

            await fetchAndApplySlides();
            setInterval(fetchAndApplySlides, cfg.SYNC_INTERVAL_MS || 300000);

            initParticles();
            animate();
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src *;">
    <title>Mother's Day Celebration - Coasters Tavern</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --rose-red: var(--cfg-primary, #A81C2E);
            --soft-pink: var(--cfg-soft-pink, #FFF0F5);
            --cream: var(--cfg-cream, #FFFAF0);
            --text-dark: var(--cfg-text-dark, #4A0E0E);
            --glow: var(--cfg-glow, rgba(168, 28, 46, 0.4));
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background-color: var(--cream);
            color: var(--text-dark);
        }

        /* Ambient Background Decoration */
        .floral-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            z-index: 0;
        }

        /* Top Floral Border */
        .floral-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 15vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            display: flex;
            justify-content: center;
            z-index: 10000;
        }
        .floral-logo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .floral-logo-container img {
            max-height: 80%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* Ambient Confetti Container */
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }
        .ambient-confetti {
            position: absolute;
            pointer-events: none;
        }

        /* Slideshow Container */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .slide.active {
            opacity: 1;
        }

        .content {
            background: rgba(255, 255, 255, 0.7);
            padding: 4rem;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(168, 28, 46, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 85%;
            width: fit-content;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .slide-overlay-img {
            max-width: 70%;
            max-height: 50vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
            border: 5px solid white;
        }

        /* Progress Bar */
        #progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(168, 28, 46, 0.05);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #ff4d94;
            box-shadow: 0 0 15px rgba(255, 77, 148, 0.6);
            transition: width 0.1s linear;
        }

        /* Countdown Slide Styles */
        .countdown-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        .countdown-timer {
            font-size: clamp(2.5rem, 6vmin, 5rem);
            font-weight: 700;
            color: var(--rose-red);
            background: rgba(255, 255, 255, 0.4);
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .blink-colon {
            animation: blinker 1s linear infinite;
            margin: 0 5px;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }
        .countdown-label {
            font-size: clamp(1rem, 2vmin, 2rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
            font-weight: 700;
            color: var(--rose-red);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(6.5rem, 16vw, 15rem);
            margin: 0;
            color: var(--rose-red);
            line-height: 1.0;
            text-shadow: 0 5px 25px rgba(168, 28, 46, 0.2);
            text-wrap: balance;
        }

        h2 {
            font-size: clamp(2rem, 4vw, 4rem);
            font-weight: 700;
            margin: 1.5rem 0;
            color: var(--text-dark);
            max-width: 90%;
            text-wrap: balance;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .subtext {
            font-size: 1.5rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            font-weight: 600;
            color: var(--text-dark);
        }

        .highlight {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--rose-red);
            margin-top: 2rem;
        }

        /* Logo Placeholder */
        .logo-seal {
            position: absolute;
            bottom: 3rem;
            right: 3rem;
            width: 120px;
            height: 120px;
            border: 2px solid var(--text-dark);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            background: rgba(255,255,255,0.8);
            z-index: 20;
        }
        /* QR Code Styling */
        .qr-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .qr-frame {
            background: white;
            padding: 1rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(168, 28, 46, 0.15);
            border: 2px solid var(--rose-red);
            transition: transform 0.3s ease;
        }

        .qr-frame:hover {
            transform: scale(1.05);
        }

        .qr-frame img {
            display: block;
            width: 180px;
            height: 180px;
        }

        .qr-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--rose-red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>

</head>
<body>

    <div class="floral-bg"></div>
    <div class="floral-top">
        <div class="floral-logo-container">
            <img src="coasters-logo.png" alt="Coasters Tavern Logo">
        </div>
    </div>
    <div id="confetti-container"></div>

    <!-- Navigation Hub -->
    <nav id="nav-hub" style="position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); border-top:1px solid rgba(168,28,46,0.2); padding:12px 20px; display:flex; justify-content:center; align-items:center; gap:20px; z-index:50000; transform:translateY(100%); transition:0.3s;" onmouseenter="this.style.transform='translateY(0)'" onmouseleave="this.style.transform='translateY(100%)'">
        <a href="../_ct-MATRIX/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">📺 Display</a>
        <a href="../_ct-MATRIX/masteradmin.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🛠 Admin</a>
        <span style="color:#ddd">|</span>
        <a href="index.html" style="color:var(--rose-red); text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🌸 MOM</a>
        <a href="../_ct-MMR/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🥩 MMR</a>
        <a href="../_ct-ACE/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🃏 ACE</a>
        <a href="../_ct-WEA/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🌦 WEA</a>
        <a href="../_ct-FIR/index.html" style="color:#999; text-decoration:none; font-size:0.8rem; font-weight:700; text-transform:uppercase;">🔥 FIR</a>

    <div class="slideshow-container" id="slides-wrapper">
        <!-- Slides are injected here by init() -->
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <script>
        // --- Security Helpers ---
        function sanitize(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
        }
        function safeUrl(url) {
            if (!url) return '';
            return String(url).trim();
        }

        // --- State ---
        let state = {
            slides: [],
            currentSlideIdx: 0,
            isPaused: false,
            disabledSlides: [],
            overrides: {}
        };

        // --- DOM Elements ---
        const slidesWrapper = document.getElementById('slides-wrapper');
        const progressBar = document.getElementById('progress-bar');

        // --- Broadcast Channel setup ---
        const bc = new BroadcastChannel('mom_sync');
        bc.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'STATE_UPDATE') {
                updateState(data.payload);
            }
            if (data.type === 'SLIDE_CMD') {
                handleSlideCmd(data.payload.cmd);
            }
            if (data.type === 'CONFETTI') {
                createConfettiBurst();
            }
        };

        function handleSlideCmd(cmd) {
            if (cmd === 'next') nextSlide();
            if (cmd === 'prev') prevSlide();
            if (cmd === 'toggle') toggleSlidePlay();
        }

        function updateState(newState) {
            state = { ...state, ...newState };
            if (newState.slides || newState.disabledSlides || newState.overrides) {
                renderSlides();
            }
            localStorage.setItem('mom_state', JSON.stringify(state));
        }

        function toggleSlidePlay() {
            state.isPaused = !state.isPaused;
            if (state.isPaused) {
                clearInterval(slideInterval);
                clearInterval(progressInterval);
            } else {
                startSlideTimer(30000); // Default resume
            }
        }

        // --- Slideshow Logic ---
        let slideInterval;
        let progressInterval;

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + 1) % slides.length;
            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 8000;
            startSlideTimer(dur);
            createConfettiBurst();
        }

        function prevSlide() {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            
            slides[state.currentSlideIdx].classList.remove('active');
            state.currentSlideIdx = (state.currentSlideIdx + slides.length - 1) % slides.length;
            slides[state.currentSlideIdx].classList.add('active');
            
            const dur = parseInt(slides[state.currentSlideIdx].getAttribute('data-duration')) || 8000;
            startSlideTimer(dur);
        }

        function startSlideTimer(duration) {
            clearInterval(slideInterval);
            clearInterval(progressInterval);
            
            let start = Date.now();
            progressBar.style.width = '0%';
            
            progressInterval = setInterval(() => {
                let elapsed = Date.now() - start;
                let percent = (elapsed / duration) * 100;
                progressBar.style.width = Math.min(percent, 100) + '%';
            }, 50);

            if (state.isPaused) return;

            slideInterval = setInterval(() => {
                if (state.isPaused) return;
                nextSlide();
            }, duration);
        }

        function renderSlides() {
            const visibleSlides = state.slides.filter(s => !(state.disabledSlides || []).includes(s.title));
            if (visibleSlides.length === 0) {
                slidesWrapper.innerHTML = '';
                return;
            }

            // Fix bounds before rendering so the active class is properly applied
            if (state.currentSlideIdx >= visibleSlides.length || state.currentSlideIdx < 0) {
                state.currentSlideIdx = 0;
            }

            const overrides = state.overrides || {};

            slidesWrapper.innerHTML = visibleSlides.map((slide, i) => {
                const ov = overrides[slide.title] || {};
                const title = ov.title || slide.title || '';
                const subtitle = ov.subtitle || slide.subtitle || '';
                const duration = ov.duration || slide.duration || 30000;

                const bgImg = safeUrl(slide.backgroundImage);
                const overlayImg = safeUrl(slide.overlayImage);
                const bgStyle = bgImg ? `background-image: url('${bgImg}'); background-size: cover; background-position: center;` : '';
                
                return `
                    <div class="slide ${i === state.currentSlideIdx ? 'active' : ''}" style="${bgStyle}" data-duration="${duration}">
                        ${bgImg ? '<div class="slide-image-overlay"></div>' : ''}
                        <div class="content" style="position: relative; z-index: 10;">
                            ${overlayImg ? `<img src="${overlayImg}" class="slide-overlay-img">` : ''}
                            ${title ? `<h1>${sanitize(title).replace(/\n/g, '<br>')}</h1>` : ''}
                            ${subtitle ? `<h2>${sanitize(subtitle).replace(/\n/g, '<br>')}</h2>` : ''}
                            ${slide.type === 'countdown' ? `
                                <div class="countdown-container">
                                    <div class="countdown-timer slide-countdown-timer">00 Days Left Until Mother's Day</div>
                                </div>
                            ` : ''}
                            ${slide.type === 'qr' ? `
                                <div class="qr-container">
                                    <div class="qr-label">Scan to Book</div>
                                    <div class="qr-frame">
                                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(slide.bubbleText || 'https://bookings.nowbookit.com/?accountid=d7034cd3-cfde-4556-a98c-ea943ec35ef4&venueid=13703&theme=dark&colors=hex,FFC0CB&date=2026-05-10&serviceids=event')}" alt="QR Code">
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const currentOv = overrides[visibleSlides[state.currentSlideIdx]?.title] || {};
            const currentDur = currentOv.duration || visibleSlides[state.currentSlideIdx]?.duration || 30000;
            startSlideTimer(currentDur);
        }

        // --- Countdown Logic ---
        function calculateMOMCountdown() {
            const target = new Date('2026-05-10T00:00:00');
            const now = new Date();
            const diff = target - now;
            if (diff <= 0) return 'Happy Mother\'s Day!';
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            return `${days} Days Until Mother's Day`;
        }
        setInterval(() => {
            const el = document.querySelector('.slide-countdown-timer');
            if (el) el.innerHTML = calculateMOMCountdown();
        }, 1000);

        // --- Google Sheets Sync ---
        function splitCSVLine(line) {
            const parts = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    parts.push(current.trim());
                    current = '';
                } else current += char;
            }
            parts.push(current.trim());
            return parts;
        }

        /**
         * Robust CSV Parser handling multi-line fields (Shift+Enter from GSheets)
         */
        function parseSlidesCSV(text) {
            const result = [];
            let row = [];
            let col = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i+1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        col += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        col += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(col.trim());
                        col = '';
                    } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                        if (char === '\r') i++;
                        row.push(col.trim());
                        result.push(row);
                        row = [];
                        col = '';
                    } else {
                        col += char;
                    }
                }
            }
            if (col || row.length > 0) {
                row.push(col.trim());
                result.push(row);
            }

            // Skip header and map to objects
            return result.slice(1).map(parts => {
                const clean = parts; // Keep original newlines for sanitization logic
                return {
                    title: clean[0],
                    subtitle: clean[1] || '',
                    type: (clean[2] || 'normal').toLowerCase(),
                    duration: parseInt(clean[3]) || 30000,
                    backgroundImage: clean[4] || '',
                    overlayImage: clean[5] || '',
                    bubbleText: clean[6] || ''
                };
            }).filter(s => s.title || s.subtitle);
        }

        async function fetchAndApplySlides() {
            const loadLocal = async () => {
                const stored = localStorage.getItem('mom_state');
                if (stored) {
                    try {
                        const parsed = JSON.parse(stored);
                        if (parsed.slides && parsed.slides.length > 0) {
                            updateState({ slides: parsed.slides, disabledSlides: parsed.disabledSlides || [], overrides: parsed.overrides || {} });
                            return true;
                        }
                    } catch(e) {}
                }
                
                // Final fallback to the hardcoded local-backup.csv
                try {
                    const res = await fetch('local-backup.csv?t=' + Date.now());
                    if (res.ok) {
                        const csv = await res.text();
                        const slides = parseSlidesCSV(csv);
                        if (slides.length > 0) {
                            updateState({ slides });
                            return true;
                        }
                    }
                } catch(e) {}
                return false;
            };

            if (localStorage.getItem('mom_sync_locked') === 'true') {
                console.log('[MOM] Sync skipped: Local CMS locked.');
                if (state.slides.length === 0) await loadLocal();
                return;
            }

            const url = window.MOM_CONFIG.GSHEETS_URL;
            if(!url) return;
            
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + Date.now());
                if (!res.ok) throw new Error("HTTP Error " + res.status);
                const csv = await res.text();
                const slides = parseSlidesCSV(csv);
                if (slides.length > 0) {
                    updateState({ slides });
                } else {
                    throw new Error("No data in sheet");
                }
            } catch (e) {
                console.error('[MOM] Failed to fetch slides:', e);
                if (state.slides.length === 0) {
                    const success = await loadLocal();
                    if (!success) {
                        document.getElementById('slides-wrapper').innerHTML = 
                            `<div style="color:red; background:white; padding: 2rem; border-radius:10px; z-index:999; font-size:2rem; font-weight:bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                                ⚠️ Fetch Error:<br>${e.message}
                            </div>`;
                    }
                }
            }
        }

        // --- Flower Confetti Logic (DOM-based, like MMR) ---
        const confettiContainer = document.getElementById('confetti-container');
        const flowers = ['💐', '🌸', '🌺', '🌷', '🌹', '🌻', 'LOGO'];

        function spawnAmbientConfetti() {
            const symbol = flowers[Math.floor(Math.random() * flowers.length)];
            const el = document.createElement('div');
            el.className = 'ambient-confetti';
            el.style.top = '-80px';
            el.style.left = Math.random() * 100 + '%';
            el.style.fontSize = Math.random() * 1.2 + 1.8 + 'rem'; // 1.8 to 3.0rem
            el.style.filter = 'drop-shadow(0 4px 10px rgba(0,0,0,0.2))';
            el.style.opacity = Math.random() * 0.5 + 0.4; // More visible flow

            if (symbol === 'LOGO') {
                const img = document.createElement('img');
                img.src = 'coasters-logo.png';
                img.style.width = '2.5rem';
                img.style.height = 'auto';
                img.style.opacity = '0.6';
                el.appendChild(img);
            } else {
                el.innerText = symbol;
            }

            const duration = Math.random() * 5 + 7; // Unified duration range
            el.style.transition = `transform ${duration}s linear`;
            confettiContainer.appendChild(el);

            setTimeout(() => {
                el.style.transform = `translateY(120vh) rotate(${Math.random() * 720}deg)`;
            }, 50);

            setTimeout(() => el.remove(), duration * 1000 + 100);
        }

        function createConfettiBurst() {
            for (let i = 0; i < 40; i++) {
                const symbol = flowers[Math.floor(Math.random() * flowers.length)];
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.top = '-80px';
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = '2.5rem';
                el.style.filter = 'drop-shadow(0 5px 15px rgba(0,0,0,0.3))';
                el.style.zIndex = Math.random() > 0.5 ? 60 : 40;

                if (symbol === 'LOGO') {
                    const img = document.createElement('img');
                    img.src = 'coasters-logo.png';
                    img.style.width = '3.5rem';
                    img.style.height = 'auto';
                    el.appendChild(img);
                } else {
                    el.innerText = symbol;
                }

                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 2;
                el.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                confettiContainer.appendChild(el);

                setTimeout(() => {
                    el.style.transform = `translateY(120vh) rotate(${Math.random() * 360}deg)`;
                    el.style.opacity = '0';
                }, delay * 1000 + 50);

                setTimeout(() => el.remove(), (duration + delay) * 1000 + 100);
            }
        }

        // Start ambient confetti loop
        setInterval(spawnAmbientConfetti, 500);

        // --- Init ---
        async function init() {
            const cfg = window.MOM_CONFIG;
            if (cfg) {
                const root = document.documentElement;
                if (cfg.COLORS.primary) root.style.setProperty('--cfg-primary', cfg.COLORS.primary);
                if (cfg.COLORS.softPink) root.style.setProperty('--cfg-soft-pink', cfg.COLORS.softPink);
                if (cfg.COLORS.cream) root.style.setProperty('--cfg-cream', cfg.COLORS.cream);
                if (cfg.COLORS.textDark) root.style.setProperty('--cfg-text-dark', cfg.COLORS.textDark);
                if (cfg.COLORS.glow) root.style.setProperty('--cfg-glow', cfg.COLORS.glow);
            }

            await fetchAndApplySlides();
            setInterval(fetchAndApplySlides, cfg.SYNC_INTERVAL_MS || 300000);
        }

        init();
    </script>
</body>
</html>
